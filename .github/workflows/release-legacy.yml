name: Release (legacy keystore)

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'versionCode to embed'
        required: true
        default: '10'

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: gradle }

      - name: Decode keystore (original Apr-10 GH-secret)
        run: |
          mkdir -p keystore
          printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore/safeopen-release.p12

      - name: Archive keystore for Infisical backup
        uses: actions/upload-artifact@v4
        with:
          name: safeopen-keystore-backup
          path: keystore/safeopen-release.p12
          retention-days: 1

      - name: Build release AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon -PversionCode=${{ github.event.inputs.version_code }}

      - name: Upload AAB → Play internal (draft)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName:        com.katafract.safeopen
          releaseFiles:       app/build/outputs/bundle/release/*.aab
          track:              internal
          status:             draft

      - name: Cleanup
        if: always()
        run: rm -f keystore/safeopen-release.p12
